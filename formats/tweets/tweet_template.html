<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #e7e9ea;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    width: 600px;
    padding: 0;
    -webkit-font-smoothing: antialiased;
  }

  .tweet-container {
    padding: 16px 16px 0 16px;
  }

  /* Profile row */
  .profile-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding-bottom: 14px;
  }
  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    flex-shrink: 0;
    object-fit: cover;
  }
  .avatar-placeholder {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    color: #fff;
  }
  .profile-info {
    flex: 1;
    min-width: 0;
  }
  .name-row {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .display-name {
    font-size: 15px;
    font-weight: 700;
    color: #e7e9ea;
    line-height: 20px;
  }
  .verified-badge {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }
  .handle {
    font-size: 15px;
    color: #71767b;
    line-height: 20px;
  }
  .profile-actions {
    display: flex;
    align-items: center;
    gap: 20px;
    padding-top: 4px;
    flex-shrink: 0;
  }
  .profile-actions svg {
    fill: #71767b;
  }

  /* Tweet text */
  .tweet-text {
    font-size: 23px;
    line-height: 30px;
    color: #e7e9ea;
    padding: 2px 0 14px 0;
    word-wrap: break-word;
    white-space: pre-wrap;
  }
  .tweet-text .mention,
  .tweet-text .hashtag,
  .tweet-text .link {
    color: #1d9bf0;
  }

  /* Timestamp + views */
  .timestamp-row {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 2px 0 14px 0;
    font-size: 15px;
    color: #71767b;
  }
  .timestamp-row .views-count {
    font-weight: 700;
    color: #e7e9ea;
  }
  .timestamp-row .dot {
    padding: 0 2px;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: #2f3336;
  }

  /* Action bar */
  .action-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 8px;
  }
  .action-item {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #71767b;
    font-size: 13.5px;
  }
  .action-item svg {
    width: 22px;
    height: 22px;
  }
</style>
</head>
<body>
<div class="tweet-container">

  <!-- Profile row -->
  <div class="profile-row">
    {{AVATAR}}
    <div class="profile-info">
      <div class="name-row">
        <span class="display-name">{{DISPLAY_NAME}}</span>
        {{VERIFIED_BADGE}}
      </div>
      <div class="handle">@{{USERNAME}}</div>
    </div>
    <div class="profile-actions">
      <!-- ø / Spaces icon -->
      <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm0 1.5c4.694 0 8.5 3.806 8.5 8.5s-3.806 8.5-8.5 8.5S3.5 16.694 3.5 12 7.306 3.5 12 3.5z" fill="#71767b"/><line x1="6.5" y1="6.5" x2="17.5" y2="17.5" stroke="#71767b" stroke-width="1.6"/></svg>
      <!-- Three dots ··· -->
      <svg viewBox="0 0 24 24" width="20" height="20"><circle cx="5" cy="12" r="2" fill="#71767b"/><circle cx="12" cy="12" r="2" fill="#71767b"/><circle cx="19" cy="12" r="2" fill="#71767b"/></svg>
    </div>
  </div>

  <!-- Tweet text -->
  <div class="tweet-text">{{TWEET_TEXT}}</div>

  <!-- Timestamp + views -->
  <div class="timestamp-row">
    <span>{{TIMESTAMP}}</span>
    <span class="dot">&middot;</span>
    <span class="views-count">{{VIEWS}}</span>
    <span>Views</span>
  </div>

  <div class="divider"></div>

  <!-- Action bar -->
  <div class="action-bar">
    <div class="action-item">
      <svg viewBox="0 0 24 24"><path d="M1.751 10c0-4.42 3.584-8 8.005-8h4.366c4.49 0 8.129 3.64 8.129 8.13 0 2.96-1.607 5.68-4.196 7.11l-8.054 4.46v-3.69h-.067c-4.49.1-8.183-3.51-8.183-8.01zm8.005-6c-3.317 0-6.005 2.69-6.005 6 0 3.37 2.77 6.08 6.138 6.01l.351-.01h1.761v2.3l5.087-2.81c1.951-1.08 3.163-3.13 3.163-5.36 0-3.39-2.744-6.13-6.129-6.13H9.756z" fill="#71767b" stroke="none"/></svg>
      <span>{{REPLIES}}</span>
    </div>
    <div class="action-item">
      <svg viewBox="0 0 24 24"><path d="M4.5 3.88l4.432 4.14-1.364 1.46L5.5 7.55V16c0 1.1.896 2 2 2H13v2H7.5c-2.209 0-4-1.791-4-4V7.55L1.432 9.48.068 8.02 4.5 3.88zM16.5 6H11V4h5.5c2.209 0 4 1.791 4 4v8.45l2.068-1.93 1.364 1.46-4.432 4.14-4.432-4.14 1.364-1.46 2.068 1.93V8c0-1.1-.896-2-2-2z" fill="#71767b" stroke="none"/></svg>
      <span>{{RETWEETS}}</span>
    </div>
    <div class="action-item">
      <svg viewBox="0 0 24 24"><path d="M16.697 5.5c-1.222-.06-2.679.51-3.89 2.16l-.805 1.09-.806-1.09C9.984 6.01 8.526 5.44 7.304 5.5c-1.243.07-2.349.78-2.91 1.91-.552 1.12-.633 2.78.479 4.82 1.074 1.97 3.257 4.27 7.129 6.61 3.87-2.34 6.052-4.64 7.126-6.61 1.111-2.04 1.03-3.7.477-4.82-.561-1.13-1.666-1.84-2.908-1.91zm4.187 7.69c-1.351 2.48-4.001 5.12-8.379 7.67l-.503.3-.504-.3c-4.379-2.55-7.029-5.19-8.382-7.67-1.36-2.5-1.41-4.86-.514-6.67.887-1.79 2.647-2.91 4.601-3.01 1.651-.09 3.368.56 4.798 2.01 1.429-1.45 3.146-2.1 4.796-2.01 1.954.1 3.714 1.22 4.601 3.01.896 1.81.846 4.17-.514 6.67z" fill="#71767b" stroke="none"/></svg>
      <span>{{LIKES}}</span>
    </div>
    <div class="action-item">
      <svg viewBox="0 0 24 24"><path d="M4 4.5C4 3.12 5.119 2 6.5 2h11C18.881 2 20 3.12 20 4.5v18.44l-8-5.71-8 5.71V4.5zM6.5 4c-.276 0-.5.22-.5.5v14.56l6-4.29 6 4.29V4.5c0-.28-.224-.5-.5-.5h-11z" fill="#71767b" stroke="none"/></svg>
      <span>{{BOOKMARKS}}</span>
    </div>
    <div class="action-item">
      <svg viewBox="0 0 24 24"><path d="M12 2.59l5.7 5.7-1.41 1.42L13 6.41V16h-2V6.41l-3.3 3.3-1.41-1.42L12 2.59zM21 15l-.02 3.51c0 1.38-1.12 2.49-2.5 2.49H5.5C4.11 21 3 19.88 3 18.5V15h2v3.5c0 .28.22.5.5.5h12.98c.28 0 .5-.22.5-.5L19 15h2z" fill="#71767b" stroke="none"/></svg>
    </div>
  </div>

  <div class="divider"></div>
</div>
</body>
</html>
